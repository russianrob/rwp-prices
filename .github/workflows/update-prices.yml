name: Update RWP Prices

on:
  schedule:
    # Runs every hour at :15 past
    - cron: '15 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build price data from CDN
        run: node build-prices.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet rwp-prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rwp-prices.json
          git commit -m "Update RWP prices ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
